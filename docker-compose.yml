services:
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    image: corpus_v2_php
    container_name: corpus_v2_app
    volumes:
      - ./backend:/var/www/html/backend
      - ./frontend:/var/www/html/frontend
    working_dir: /var/www/html/backend
    environment:
      - APP_ENV=local
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=corpus_motel
      - DB_USERNAME=root
      - DB_PASSWORD=
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - mysql
      - redis
    networks:
      - corpus_network

  nginx:
    image: nginx:latest
    container_name: corpus_v2_nginx
    ports:
      - 8080:80
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www/html/backend
      - ./frontend:/var/www/html/frontend
    depends_on:
      - app
    networks:
      - corpus_network

  mysql:
    image: mysql:8.0
    container_name: corpus_v2_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ''
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
      MYSQL_DATABASE: corpus_motel
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - 3307:3306
    networks:
      - corpus_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: corpus_v2_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ''
      PMA_ALLOW_NO_PASSWORD: 'yes'
    ports:
      - 8082:80
    depends_on:
      - mysql
    networks:
      - corpus_network

  redis:
    image: redis:7-alpine
    container_name: corpus_v2_redis
    ports:
      - 6379:6379
    networks:
      - corpus_network

networks:
  corpus_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
